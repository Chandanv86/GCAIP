version: "3.9"

services:
  db:
    image: timescale/timescaledb-ha:pg16
    container_name: gcaip_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gcaip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gcaip_secret}
      POSTGRES_DB: ${POSTGRES_DB:-gcaip}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gcaip} -d ${POSTGRES_DB:-gcaip}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gcaip_net

  redis:
    image: redis:7-alpine
    container_name: gcaip_redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gcaip_net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gcaip_api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-gcaip}:${POSTGRES_PASSWORD:-gcaip_secret}@db:5432/${POSTGRES_DB:-gcaip}
      - REDIS_URL=redis://redis:6379/0
      - GEE_SERVICE_ACCOUNT=${GEE_SERVICE_ACCOUNT}
      - GEE_CREDENTIALS_PATH=/app/credentials/africa-analysis45678-89989fd43a20.json
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - MAPBOX_TOKEN=${MAPBOX_TOKEN:-}
      - ENVIRONMENT=production
    volumes:
      - ./credentials:/app/credentials:ro
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gcaip_net

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gcaip_worker
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=8 -Q default,gee_tasks,enrichment_tasks,alert_tasks
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-gcaip}:${POSTGRES_PASSWORD:-gcaip_secret}@db:5432/${POSTGRES_DB:-gcaip}
      - REDIS_URL=redis://redis:6379/0
      - GEE_SERVICE_ACCOUNT=${GEE_SERVICE_ACCOUNT}
      - GEE_CREDENTIALS_PATH=/app/credentials/africa-analysis45678-89989fd43a20.json
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - ENVIRONMENT=production
    volumes:
      - ./credentials:/app/credentials:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gcaip_net

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gcaip_beat
    command: celery -A workers.celery_app beat --loglevel=info --scheduler celery.beat.PersistentScheduler
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-gcaip}:${POSTGRES_PASSWORD:-gcaip_secret}@db:5432/${POSTGRES_DB:-gcaip}
      - REDIS_URL=redis://redis:6379/0
      - GEE_SERVICE_ACCOUNT=${GEE_SERVICE_ACCOUNT}
      - GEE_CREDENTIALS_PATH=/app/credentials/africa-analysis45678-89989fd43a20.json
      - ENVIRONMENT=production
    volumes:
      - ./credentials:/app/credentials:ro
    depends_on:
      - worker
    networks:
      - gcaip_net

volumes:
  pgdata:
  redisdata:

networks:
  gcaip_net:
    driver: bridge
